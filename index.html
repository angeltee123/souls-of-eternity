<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Souls of Eternity</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<main class="game">

  <h1>SOULS OF ETERNITY</h1>

  <!-- START -->
  <section id="start">
    <button onclick="goToCreate()">Start</button>
    <button onclick="loadGame()">Load</button>
  </section>

  <!-- CREATE -->
  <section id="create" class="hidden">
    <input id="nameInput" placeholder="Name..." />
    <button onclick="startGame('Warrior')">Warrior</button>
    <button onclick="startGame('Mage')">Mage</button>
    <button onclick="startGame('Rogue')">Rogue</button>
  </section>

  <!-- GAME -->
  <section id="game" class="hidden">

    <div id="stats"></div>
    <div id="inventory"></div>

    <div id="room"></div>
    <div id="actions"></div>

    <div id="log"></div>

    <button onclick="saveGame()">Save</button>

  </section>

</main>

<script src="game.js"></script>

</body>
</html>
