<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>No Way Out</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<main class="game-container">

  <header>
    <h1>SOULS OF ETERNITY</h1>
    <p class="subtitle">BY ANGEL TREE</p>
  </header>

  <!-- START SCREEN -->
  <section id="screen-start" class="screen">
    <div class="center-box">
      <h2>Welcome Adventurer</h2>

      <button onclick="goToClassSelection()">New Game</button>
      <button onclick="loadGame()">Load Game</button>
    </div>
  </section>

  <!-- CLASS SCREEN -->
  <section id="screen-class" class="screen hidden">

    <div class="center-box">

      <h2>Create Character</h2>

      <input
        type="text"
        id="char-name"
        placeholder="Character Name"
        value="Hero"
      >

      <div class="actions">

        <button onclick="startGame('Warrior')">
          Warrior
        </button>

        <button onclick="startGame('Mage')">
          Mage
        </button>

        <button onclick="startGame('Rogue')">
          Rogue
        </button>

      </div>

    </div>

  </section>

  <!-- GAME SCREEN -->
  <section id="screen-game" class="screen hidden">

    <div class="top-ui">

      <div id="stats"></div>

      <div id="inventory"></div>

    </div>

    <div id="room"></div>

    <div id="actions" class="actions"></div>

    <div id="log-container">
      <div id="log"></div>
    </div>

    <div class="bottom-buttons">
      <button onclick="saveGame()">Save Game</button>
    </div>

  </section>

</main>

<script src="game.js"></script>

</body>
</html>
