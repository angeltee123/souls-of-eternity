<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Souls of Eternity</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<main class="game">

  <header class="header">
    <h1>SOULS OF ETERNITY</h1>
    <p>RPG Prototype</p>
  </header>

  <!-- START -->
  <section id="start" class="screen">
    <button onclick="goToCreate()">Start Game</button>
  </section>

  <!-- CREATE -->
  <section id="create" class="screen hidden">
    <input id="nameInput" placeholder="Name..." />
    <button onclick="startGame('Warrior')">Warrior</button>
    <button onclick="startGame('Mage')">Mage</button>
    <button onclick="startGame('Rogue')">Rogue</button>
  </section>

  <!-- GAME -->
  <section id="game" class="screen hidden">

    <div class="top">
      <div id="stats"></div>
      <div id="inventory"></div>
    </div>

    <div id="room"></div>

    <div id="actions"></div>

    <div id="log"></div>

    <button onclick="saveGame()">Save</button>
    <button onclick="loadGame()">Load</button>

  </section>

</main>

<script src="game.js"></script>
</body>
</html>
